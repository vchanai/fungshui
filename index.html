    const { useState, useEffect } = React;

    // --- 三合盤數據 ---

    // --- 三元盤數據 ---
    const SANYUAN_DATA = [

    ];

    const DIRECTIONS_8 = ['正北', '東北', '正東', '東南', '正南', '西南', '正西', '西北'];

    const BAGUA_DATA = [
        { name: '坎', symbol: '☵', num: '1', numColor: 'black' },
        { name: '艮', symbol: '☶', num: '8', numColor: '#d32f2f' },
        { name: '震', symbol: '☳', num: '3', numColor: 'black' },

    ];

    // --- Icons ---
    const IconUpload = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    );
    const IconLayers = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
    );
    const IconRotate = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
    );
    const IconZoom = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    );
    const IconEye = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
    );
    const IconMove = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
    );

    function FengShuiUploader() {
        const [image, setImage] = useState(null);
        const [scale, setScale] = useState(0.5); 
        const [position, setPosition] = useState({ x: 0, y: 0 });
        const [rotation, setRotation] = useState(180);
        const [opacity, setOpacity] = useState(0.5); 
        // 修改：默認模式改為 grid (九宮格)
        const [mode, setMode] = useState('grid'); 
        
        // 九宮格的寬高
        const [gridWidth, setGridWidth] = useState(500);
        const [gridHeight, setGridHeight] = useState(500);

        const [isDragging, setIsDragging] = useState(false);
        const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
        const [initialPinchDist, setInitialPinchDist] = useState(null);
        const [initialScale, setInitialScale] = useState(1);

        const canvasWidth = 800;
        const canvasHeight = 800;
        const centerX = canvasWidth / 2;
        const centerY = canvasHeight / 2;

        const handleFileChange = (e) => {
            const file = e.target.files && e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        setImage(event.target.result);
                        setPosition({ x: 0, y: 0 });
                        
                        // 自動計算合適的初始縮放比例
                        const maxSide = Math.max(img.naturalWidth, img.naturalHeight);
                        let initialScaleCalc = 600 / maxSide;
                        
                        if (initialScaleCalc < 0.1) initialScaleCalc = 0.1;
                        if (initialScaleCalc > 1) initialScaleCalc = 1;

                        setScale(initialScaleCalc);

                        // 根據圖片比例初始化九宮格，但保持在合理範圍內
                        const aspect = img.naturalWidth / img.naturalHeight;
                        let newW, newH;
                        if (aspect >= 1) {
                            newW = 600;
                            newH = 600 / aspect;
                        } else {
                            newH = 600;
                            newW = 600 * aspect;
                        }
                        setGridWidth(Math.round(newW));
                        setGridHeight(Math.round(newH));
                    };
                };
                reader.readAsDataURL(file);
            }
        };

        const getDistance = (touches) => {
            return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
        };

        const handleMouseDown = (e) => {
            if (!image) return;
            setIsDragging(true);
            setDragStart({ x: e.clientX - position.x, y: e.clientY - position.y });
        };

        const handleMouseMove = (e) => {
            if (isDragging && image) {
                setPosition({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
            }
        };

        const handleMouseUp = () => {
            setIsDragging(false);
        };

        const handleTouchStart = (e) => {
            if (!image) return;
            if (e.touches.length === 1) {
                setIsDragging(true);
                setDragStart({ x: e.touches[0].clientX - position.x, y: e.touches[0].clientY - position.y });
            } else if (e.touches.length === 2) {
                setIsDragging(false);
                setInitialPinchDist(getDistance(e.touches));
                setInitialScale(scale);
            }
        };

        const handleTouchMove = (e) => {
            if (!image) return;
            if (e.touches.length === 1 && isDragging) {
                setPosition({ x: e.touches[0].clientX - dragStart.x, y: e.touches[0].clientY - dragStart.y });
            } else if (e.touches.length === 2 && initialPinchDist) {
                const currentDist = getDistance(e.touches);
                const newScale = Math.min(Math.max(initialScale * (currentDist / initialPinchDist), 0.05), 5);
                setScale(newScale);
            }
        };

        const handleTouchEnd = () => {
            setIsDragging(false);
            setInitialPinchDist(null);
        };

        const polarToCartesian = (centerX, centerY, radius, angleInDegrees) => {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        };

        // --- RENDERERS ---

        const renderGrid = () => {
            const w = gridWidth;
            const h = gridHeight;
            const stepX = w / 3;
            const stepY = h / 3;
            const halfW = w / 2;
            const halfH = h / 2;
            
            return (
                <g transform={`translate(${centerX}, ${centerY}) rotate(${rotation})`} style={{ pointerEvents: 'none' }}>
                    {/* 外框 - 加粗到 5 */}
                    <rect x={-halfW} y={-halfH} width={w} height={h} fill="none" stroke="rgba(37, 99, 235, 0.8)" strokeWidth="5" />
                    
                    {/* 垂直線 - 加粗到 3 */}
                    <line x1={-halfW + stepX} y1={-halfH} x2={-halfW + stepX} y2={halfH} stroke="rgba(37, 99, 235, 0.6)" strokeWidth="3" />
                    <line x1={-halfW + stepX * 2} y1={-halfH} x2={-halfW + stepX * 2} y2={halfH} stroke="rgba(37, 99, 235, 0.6)" strokeWidth="3" />
                    
                    {/* 水平線 - 加粗到 3 */}
                    <line x1={-halfW} y1={-halfH + stepY} x2={halfW} y2={-halfH + stepY} stroke="rgba(37, 99, 235, 0.6)" strokeWidth="3" />
                    <line x1={-halfW} y1={-halfH + stepY * 2} x2={halfW} y2={-halfH + stepY * 2} stroke="rgba(37, 99, 235, 0.6)" strokeWidth="3" />
                    
                    {/* 北向標記 */}
                    <text x={0} y={-halfH - 15} transform={`rotate(${-rotation} 0 ${-halfH - 15})`} textAnchor="middle" fill="#1d4ed8" fontSize="18" fontWeight="bold" style={{textShadow: '0 0 4px white'}}>N</text>
                </g>
            );
        };

        const renderPie = () => {
            const lines = [];
            const labels = ['N (坎)', 'NE (艮)', 'E (震)', 'SE (巽)', 'S (離)', 'SW (坤)', 'W (兌)', 'NW (乾)'];
            const radius = 560; 
            for (let i = 0; i < 8; i++) {
                const angleDeg = (i * 45) - 90 + rotation; 
                const angleRad = (angleDeg * Math.PI) / 180;
                const textRadius = 320; 
                const tx = centerX + textRadius * Math.cos(angleRad);
                const ty = centerY + textRadius * Math.sin(angleRad);
                const borderAngleDeg = angleDeg - 22.5;
                const borderRad = (borderAngleDeg * Math.PI) / 180;
                const bx = centerX + radius * Math.cos(borderRad);
                const by = centerY + radius * Math.sin(borderRad);
                lines.push(
                    <g key={i} style={{ pointerEvents: 'none' }}>
                        {/* 放射線 - 加粗到 3 */}
                        <line x1={centerX} y1={centerY} x2={bx} y2={by} stroke="rgba(22, 163, 74, 0.8)" strokeWidth="3" strokeDasharray="5,5" />
                        <text x={tx} y={ty} fill="#15803d" fontSize="16" fontWeight="bold" textAnchor="middle" dominantBaseline="middle" style={{ textShadow: '0px 0px 4px white' }}>{labels[i]}</text>
                    </g>
                );
            }
            return lines;
        };

        // --- 三合盤 (San He) 邏輯 ---
        const render24Mountains = () => {
            const elements = [];
            
            const r_max = 380;       
            const r_ticks_in = 360;  
            const r_heaven_outer = 355; 
            const r_man_outer = 295;    
            const r_earth_outer = 235;  
            const r_center_hub = 20;

            const r_text_heaven = 325; 
            const r_text_man = 265;    
            const r_text_earth = 205;  

            // 背景圓 - 使用透明度
            elements.push(<circle key="c_base" cx={0} cy={0} r={r_max} fill={`rgba(255,255,255,${opacity})`} stroke="#333" strokeWidth="1" />);
            elements.push(<circle key="c_ticks" cx={0} cy={0} r={r_ticks_in} fill="none" stroke="#333" strokeWidth="1.5" />);
            
            elements.push(<circle key="c_r1" cx={0} cy={0} r={r_heaven_outer} fill="none" stroke="#333" strokeWidth="1" />);
            elements.push(<circle key="c_r2" cx={0} cy={0} r={r_man_outer} fill="none" stroke="#333" strokeWidth="1" />);
            elements.push(<circle key="c_r3" cx={0} cy={0} r={r_earth_outer} fill="none" stroke="#333" strokeWidth="1" />);
            elements.push(<circle key="c_hub" cx={0} cy={0} r={r_center_hub} fill="white" stroke="#dc2626" strokeWidth="2" />);

            for (let i = 0; i < 360; i++) {
                const isTen = i % 10 === 0;
                const isFive = i % 5 === 0;
                const tickLen = isTen ? 12 : (isFive ? 8 : 4);
                const angleDeg = i - 90; 
                const angleRad = (angleDeg * Math.PI) / 180;

                const x1 = r_max * Math.cos(angleRad);
                const y1 = r_max * Math.sin(angleRad);
                const x2 = (r_max - tickLen) * Math.cos(angleRad);
                const y2 = (r_max - tickLen) * Math.sin(angleRad);

                elements.push(<line key={`t_${i}`} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#000" strokeWidth={isTen ? 2 : (isFive ? 1.5 : 0.5)} />);
                
                if (isTen) {
                    const tx = (r_max - 22) * Math.cos(angleRad);
                    const ty = (r_max - 22) * Math.sin(angleRad);
                    elements.push(
                        <text key={`tn_${i}`} x={tx} y={ty} 
                            transform={`rotate(${angleDeg + 90}, ${tx}, ${ty})`}
                            fontSize="10" fontFamily="Arial" fontWeight="bold" fill="#000" textAnchor="middle" dominantBaseline="middle">
                            {i}
                        </text>
                    );
                }
            }

            // 地盤紅線
            for (let i = 0; i < 24; i++) {
                const angleDeg = (i * 15) + 7.5; 
                const angleRad = ((angleDeg - 90) * Math.PI) / 180;

                const x1 = r_center_hub * Math.cos(angleRad);
                const y1 = r_center_hub * Math.sin(angleRad);
                const x2 = r_heaven_outer * Math.cos(angleRad);
                const y2 = r_heaven_outer * Math.sin(angleRad);

                elements.push(<line key={`rl_${i}`} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#dc2626" strokeWidth="0.8" opacity="0.8" />);
            }

            // 天盤綠線
            for (let i = 0; i < 24; i++) {
                const angleDeg = (i * 15) + 15; 
                const angleRad = ((angleDeg - 90) * Math.PI) / 180;

                const x1 = r_center_hub * Math.cos(angleRad);
                const y1 = r_center_hub * Math.sin(angleRad);
                const x2 = r_heaven_outer * Math.cos(angleRad);
                const y2 = r_heaven_outer * Math.sin(angleRad);

                elements.push(<line key={`gl_${i}`} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#16a34a" strokeWidth="0.8" opacity="0.8" />);
            }

            SAN_HE_DATA.forEach((m, idx) => {
                const earthTextColor = m.color === 'red' ? '#dc2626' : '#000000';
                const heavenTextColor = m.color === 'red' ? '#dc2626' : '#000000';
                const manTextColor = '#000000'; 

                // 地盤
                const angleInner = m.angle;
                const radInner = ((angleInner - 90) * Math.PI) / 180;
                const tx1 = r_text_earth * Math.cos(radInner);
                const ty1 = r_text_earth * Math.sin(radInner);
                elements.push(
                    <text key={`in_${idx}`} x={tx1} y={ty1}
                        transform={`rotate(${angleInner}, ${tx1}, ${ty1})`}
                        fontSize="22" fontWeight="bold" fill={earthTextColor} 
                        textAnchor="middle" dominantBaseline="middle" style={{fontFamily: 'serif', textShadow: '0 0 2px rgba(255,255,255,0.7)'}}>
                        {m.char}
                    </text>
                );

                // 人盤
                const angleMid = m.angle - 7.5;
                const radMid = ((angleMid - 90) * Math.PI) / 180;
                const tx2 = r_text_man * Math.cos(radMid);
                const ty2 = r_text_man * Math.sin(radMid);
                elements.push(
                    <text key={`mid_${idx}`} x={tx2} y={ty2}
                        transform={`rotate(${angleMid}, ${tx2}, ${ty2})`}
                        fontSize="22" fontWeight="bold" fill={manTextColor} 
                        textAnchor="middle" dominantBaseline="middle" style={{fontFamily: 'serif', textShadow: '0 0 2px rgba(255,255,255,0.7)'}}>
                        {m.char}
                    </text>
                );

                // 天盤
                const angleOuter = m.angle + 7.5;
                const radOuter = ((angleOuter - 90) * Math.PI) / 180;
                const tx3 = r_text_heaven * Math.cos(radOuter);
                const ty3 = r_text_heaven * Math.sin(radOuter);
                elements.push(
                    <text key={`out_${idx}`} x={tx3} y={ty3}
                        transform={`rotate(${angleOuter}, ${tx3}, ${ty3})`}
                        fontSize="22" fontWeight="bold" fill={heavenTextColor} 
                        textAnchor="middle" dominantBaseline="middle" style={{fontFamily: 'serif', textShadow: '0 0 2px rgba(255,255,255,0.7)'}}>
                        {m.char}
                    </text>
                );
            });

            return (
                <g transform={`translate(${centerX}, ${centerY}) rotate(${rotation})`} style={{ pointerEvents: 'none' }}>
                    {elements}
                    <line x1={-r_max} y1={0} x2={r_max} y2={0} stroke="red" strokeWidth="1" strokeDasharray="5,5" opacity="0.3" />
                    <line x1={0} y1={-r_max} x2={0} y2={r_max} stroke="red" strokeWidth="1" strokeDasharray="5,5" opacity="0.3" />
                </g>
            );
        };

        // --- 三元盤 (San Yuan) 邏輯 ---
        const renderCompass = () => {
            const elements = [];
            const r_outer = 380; 
            const r_ticks_in = 360; 
            const r_directions = 320; 
            const r_24m_outer = 290; 
            const r_24m_inner = 230; 
            const r_bagua_outer = 230;
            const r_bagua_inner = 80;

            // 背景圓 - 使用透明度
            elements.push(<circle key="bg" cx={0} cy={0} r={r_outer} fill={`rgba(255,255,255,${opacity})`} stroke="#333" strokeWidth="2" />);
            elements.push(<circle key="bg_inner" cx={0} cy={0} r={r_ticks_in} fill="none" stroke="#333" strokeWidth="1" />);
            elements.push(<circle key="bg_24m" cx={0} cy={0} r={r_24m_outer} fill="none" stroke="#333" strokeWidth="1" />);
            elements.push(<circle key="bg_bagua" cx={0} cy={0} r={r_24m_inner} fill="none" stroke="#333" strokeWidth="1" />);
            elements.push(<circle key="bg_center" cx={0} cy={0} r={r_bagua_inner} fill="none" stroke="#333" strokeWidth="1" />);

            for (let i = 0; i < 360; i++) {
                const isFive = i % 5 === 0;
                const isTen = i % 10 === 0;
                const tickLen = isTen ? 10 : (isFive ? 7 : 4);
                const angleDeg = i - 90; 
                const angleRad = (angleDeg * Math.PI) / 180;
                const x1 = r_ticks_in * Math.cos(angleRad);
                const y1 = r_ticks_in * Math.sin(angleRad);
                const x2 = (r_ticks_in + tickLen) * Math.cos(angleRad);
                const y2 = (r_ticks_in + tickLen) * Math.sin(angleRad);
                elements.push(<line key={`t${i}`} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#000" strokeWidth={isFive ? 1.5 : 0.5} />);
                if (isFive) {
                    const textR = r_ticks_in + 18;
                    const tx = textR * Math.cos(angleRad);
                    const ty = textR * Math.sin(angleRad);
                    elements.push(
                        <text key={`tn${i}`} x={tx} y={ty} 
                            transform={`rotate(${angleDeg + 90}, ${tx}, ${ty})`}
                            fontSize="8" fontWeight="bold" fill="#000" textAnchor="middle" dominantBaseline="middle">
                            {i}
                        </text>
                    );
                }
            }

            DIRECTIONS_8.forEach((dir, i) => {
                const angleDeg = i * 45 - 90;
                const angleRad = (angleDeg * Math.PI) / 180;
                const tx = (r_directions + 15) * Math.cos(angleRad);
                const ty = (r_directions + 15) * Math.sin(angleRad);
                elements.push(
                    <text key={`dir${i}`} x={tx} y={ty} 
                        transform={`rotate(${angleDeg + 90}, ${tx}, ${ty})`}
                        fontSize="24" fontWeight="bold" fill="#000" textAnchor="middle" dominantBaseline="middle" style={{fontFamily: 'serif', textShadow: '0 0 2px rgba(255,255,255,0.7)'}}>
                        {dir}
                    </text>
                );
            });

            SANYUAN_DATA.forEach((item, i) => {
                const startAngle = (i * 15) - 7.5;
                const endAngle = (i * 15) + 7.5;
                const p1 = polarToCartesian(0, 0, r_24m_outer, endAngle);
                const p2 = polarToCartesian(0, 0, r_24m_outer, startAngle);
                const p3 = polarToCartesian(0, 0, r_24m_inner, startAngle);
                const p4 = polarToCartesian(0, 0, r_24m_inner, endAngle);
                const d = ["M", p1.x, p1.y, "A", r_24m_outer, r_24m_outer, 0, 0, 0, p2.x, p2.y, "L", p3.x, p3.y, "A", r_24m_inner, r_24m_inner, 0, 0, 1, p4.x, p4.y, "Z"].join(" ");
                
                elements.push(<path key={`mw${i}`} d={d} fill={item.bg} fillOpacity={opacity} stroke="#333" strokeWidth="0.5" />);
                
                const angleDeg = i * 15 - 90;
                const angleRad = (angleDeg * Math.PI) / 180;
                const r_text = (r_24m_outer + r_24m_inner) / 2;
                const tx = r_text * Math.cos(angleRad);
                const ty = r_text * Math.sin(angleRad);
                elements.push(
                    <text key={`mt${i}`} x={tx} y={ty} 
                        transform={`rotate(${angleDeg + 90}, ${tx}, ${ty})`}
                        fontSize="22" fontWeight="bold" fill={item.text} textAnchor="middle" dominantBaseline="middle" style={{textShadow: '0 0 2px rgba(255,255,255,0.7)'}}>
                        {item.char}
                    </text>
                );
            });

            BAGUA_DATA.forEach((item, i) => {
                const angleDeg = i * 45 - 90;
                const angleRad = (angleDeg * Math.PI) / 180;
                const r_num = 190;
                const tx_num = r_num * Math.cos(angleRad);
                const ty_num = r_num * Math.sin(angleRad);
                elements.push(
                    <text key={`bn${i}`} x={tx_num} y={ty_num} 
                        transform={`rotate(${angleDeg + 90}, ${tx_num}, ${ty_num})`}
                        fontSize="28" fontWeight="bold" fill={item.numColor} textAnchor="middle" dominantBaseline="middle" style={{fontFamily: 'serif', textShadow: '0 0 2px rgba(255,255,255,0.7)'}}>
                        {item.num}
                    </text>
                );
                const r_name = 150;
                const tx_name = r_name * Math.cos(angleRad);
                const ty_name = r_name * Math.sin(angleRad);
                elements.push(
                    <text key={`bname${i}`} x={tx_name} y={ty_name} 
                        transform={`rotate(${angleDeg + 90}, ${tx_name}, ${ty_name})`}
                        fontSize="24" fontWeight="bold" fill="black" textAnchor="middle" dominantBaseline="middle" style={{fontFamily: 'serif', textShadow: '0 0 2px rgba(255,255,255,0.7)'}}>
                        {item.name}
                    </text>
                );
                const r_sym = 110;
                const tx_sym = r_sym * Math.cos(angleRad);
                const ty_sym = r_sym * Math.sin(angleRad);
                elements.push(
                    <text key={`bsym${i}`} x={tx_sym} y={ty_sym} 
                        transform={`rotate(${angleDeg + 90}, ${tx_sym}, ${ty_sym})`}
                        fontSize="36" fontWeight="normal" fill="black" textAnchor="middle" dominantBaseline="middle" style={{textShadow: '0 0 2px rgba(255,255,255,0.7)'}}>
                        {item.symbol}
                    </text>
                );
            });

            for (let i = 0; i < 8; i++) {
                const angleDeg = (i * 45) - 90 - 22.5; 
                const angleRad = (angleDeg * Math.PI) / 180;
                const x1 = r_bagua_inner * Math.cos(angleRad);
                const y1 = r_bagua_inner * Math.sin(angleRad);
                const x2 = r_outer * Math.cos(angleRad);
                const y2 = r_outer * Math.sin(angleRad);
                elements.push(<line key={`rl${i}`} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#dc2626" strokeWidth="2" />);
            }

            return (
                <g transform={`translate(${centerX}, ${centerY}) rotate(${rotation})`} style={{ pointerEvents: 'none' }}>
                    {elements}
                    <line x1={-r_outer} y1={0} x2={r_outer} y2={0} stroke="#dc2626" strokeWidth="1" strokeDasharray="4,4" opacity="0.5" />
                    <line x1={0} y1={-r_outer} x2={0} y2={r_outer} stroke="#dc2626" strokeWidth="1" strokeDasharray="4,4" opacity="0.5" />
                    <circle cx={0} cy={0} r={5} fill="#fff" stroke="#dc2626" strokeWidth="2" />
                </g>
            );
        };

        return (
            <div className="w-full max-w-2xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden font-sans border border-gray-200 flex flex-col">
                <div className="bg-slate-50 p-3 border-b border-gray-200 flex justify-between items-center z-20">
                    <h2 className="text-base font-bold text-gray-800 flex items-center gap-2">
                        <IconLayers />
                        專業風水立極尺
                    </h2>
                    <label className="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg flex items-center gap-2 text-sm font-bold shadow-sm transition-colors">
                        <IconUpload />
                        上傳戶型
                        <input type="file" accept="image/*" onChange={handleFileChange} className="hidden" />
                    </label>
                </div>

                <div 
                    className="relative w-full aspect-square bg-gray-100 overflow-hidden cursor-move select-none border-b border-gray-200"
                    style={{backgroundImage: 'radial-gradient(#ddd 1px, transparent 1px)', backgroundSize: '20px 20px', touchAction: 'none'}}
                    onMouseDown={handleMouseDown}
                    onMouseMove={handleMouseMove}
                    onMouseUp={handleMouseUp}
                    onMouseLeave={handleMouseUp}
                    onTouchStart={handleTouchStart}
                    onTouchMove={handleTouchMove}
                    onTouchEnd={handleTouchEnd}
                >
                    <div 
                        className="absolute origin-center transition-transform duration-0 ease-linear"
                        style={{
                            left: '50%',
                            top: '50%',
                            transform: `translate(-50%, -50%) translate(${position.x}px, ${position.y}px) scale(${scale})`,
                        }}
                    >
                        {image ? (
                            <img src={image} alt="Floor Plan" className="max-w-none opacity-90" style={{ pointerEvents: 'none', display: 'block' }} draggable="false" />
                        ) : (
                            <div className="flex flex-col items-center justify-center w-64 h-64 border-4 border-dashed border-gray-300 rounded-xl text-gray-400">
                                <div className="mb-2 opacity-20 transform scale-150">
                                    <IconUpload />
                                </div>
                                <span className="text-sm">請上傳圖片</span>
                            </div>
                        )}
                    </div>

                    <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox={`0 0 ${canvasWidth} ${canvasHeight}`} preserveAspectRatio="xMidYMid meet" style={{ zIndex: 10 }}>
                        {mode === 'grid' && renderGrid()}
                        {mode === 'pie' && renderPie()}
                        {mode === '24mountains' && render24Mountains()}
                        {mode === 'compass' && renderCompass()}
                        <circle cx={centerX} cy={centerY} r="4" fill="#dc2626" stroke="white" strokeWidth="2" />
                    </svg>
                </div>

                <div className="bg-white p-4 flex flex-col gap-4 z-20">
                    <div className="grid grid-cols-2 gap-2 bg-gray-50 p-2 rounded-lg border border-gray-100">
                        <button onClick={() => setMode('grid')} className={`py-2 rounded-md text-sm font-bold flex items-center justify-center gap-2 transition-all ${mode === 'grid' ? 'bg-blue-100 text-blue-700 border border-blue-200' : 'bg-white text-gray-500 border border-gray-200'}`}>
                            九宮格
                        </button>
                        <button onClick={() => setMode('pie')} className={`py-2 rounded-md text-sm font-bold flex items-center justify-center gap-2 transition-all ${mode === 'pie' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-white text-gray-500 border border-gray-200'}`}>
                            放射法
                        </button>
                        <button onClick={() => setMode('24mountains')} className={`py-2 rounded-md text-sm font-bold flex items-center justify-center gap-2 transition-all ${mode === '24mountains' ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-white text-gray-500 border border-gray-200'}`}>
                            三合盤
                        </button>
                        <button onClick={() => setMode('compass')} className={`py-2 rounded-md text-sm font-bold flex items-center justify-center gap-2 transition-all ${mode === 'compass' ? 'bg-orange-100 text-orange-700 border border-orange-200' : 'bg-white text-gray-500 border border-gray-200'}`}>
                            三元盤
                        </button>
                    </div>

                    {/* 九宮格專屬調整區 - 只有在九宮格模式下顯示 */}
                    {mode === 'grid' && (
                        <div className="grid grid-cols-2 gap-4 bg-blue-50 p-3 rounded-lg border border-blue-100">
                            <div>
                                <div className="flex justify-between mb-1">
                                    <label className="text-xs font-bold text-blue-700 flex items-center gap-1"><IconMove /> 九宮格寬度</label>
                                </div>
                                <input 
                                    type="range" min="100" max="1200" step="10" 
                                    value={gridWidth} onChange={(e) => setGridWidth(Number(e.target.value))} 
                                    className="w-full h-1 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                />
                            </div>
                            <div>
                                <div className="flex justify-between mb-1">
                                    <label className="text-xs font-bold text-blue-700 flex items-center gap-1"><IconMove /> 九宮格高度</label>
                                </div>
                                <input 
                                    type="range" min="100" max="1200" step="10" 
                                    value={gridHeight} onChange={(e) => setGridHeight(Number(e.target.value))} 
                                    className="w-full h-1 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                />
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <div className="flex justify-between mb-1">
                                <label className="text-xs font-bold text-gray-600 flex items-center gap-1"><IconRotate /> 羅盤方位 (N)</label>
                                <span className="text-xs font-mono bg-gray-100 px-1 rounded">{rotation}°</span>
                            </div>
                            <input 
                                type="range" min="0" max="360" value={rotation} onChange={(e) => setRotation(Number(e.target.value))} 
                                className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-red-600"
                            />
                        </div>
                        <div>
                            <div className="flex justify-between mb-1">
                                <label className="text-xs font-bold text-gray-600 flex items-center gap-1"><IconZoom /> 圖片縮放</label>
                                <span className="text-xs font-mono bg-gray-100 px-1 rounded">{(scale * 100).toFixed(0)}%</span>
                            </div>
                            <input type="range" min="0.05" max="3" step="0.05" value={scale} onChange={(e) => setScale(Number(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                        </div>
                        <div className="col-span-2">
                            <div className="flex justify-between mb-1">
                                <label className="text-xs font-bold text-gray-600 flex items-center gap-1"><IconEye /> 羅盤透明度</label>
                                <span className="text-xs font-mono bg-gray-100 px-1 rounded">{Math.round((1 - opacity) * 100)}%</span>
                            </div>
                            <input type="range" min="0.1" max="1" step="0.05" value={opacity} onChange={(e) => setOpacity(Number(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-gray-600" />
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FengShuiUploader />);
</script>

</body>
</html>
