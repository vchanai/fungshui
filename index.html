<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>風水立極尺 (圖片版)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background-color: #f3f4f6; padding: 20px; font-family: sans-serif; }
        .canvas-container {
            background-image: radial-gradient(#ccc 1px, transparent 1px);
            background-size: 20px 20px;
            /* CRITICAL: Prevents the whole page from scrolling when dragging on mobile */
            touch-action: none; 
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Icons
    const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
    const IconRefresh = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>;
    const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
    const IconImage = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
    const IconRotate = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>;
    const IconZoom = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
    const IconGrid = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>;
    const IconPie = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;

    const FengShuiUploader = () => {
        const [image, setImage] = useState(null);
        const [scale, setScale] = useState(1);
        const [position, setPosition] = useState({ x: 0, y: 0 });
        const [rotation, setRotation] = useState(180);
        const [mode, setMode] = useState('pie'); 
        const [isDragging, setIsDragging] = useState(false);
        const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
        const [fileName, setFileName] = useState('');

        const canvasWidth = 800;
        const canvasHeight = 600;
        const centerX = canvasWidth / 2;
        const centerY = canvasHeight / 2;

        const handleFileChange = (e) => {
            const file = e.target.files?.[0];
            if (file) {
                setFileName(file.name);
                const reader = new FileReader();
                reader.onload = (event) => {
                    setImage(event.target.result);
                    setPosition({ x: 0, y: 0 });
                    setScale(1);
                };
                reader.readAsDataURL(file);
            }
        };

        // --- Mouse Events (Laptop/Desktop) ---
        const handleMouseDown = (e) => {
            if (!image) return;
            setIsDragging(true);
            setDragStart({
                x: e.clientX - position.x,
                y: e.clientY - position.y
            });
        };

        const handleMouseMove = (e) => {
            if (isDragging && image) {
                setPosition({
                    x: e.clientX - dragStart.x,
                    y: e.clientY - dragStart.y
                });
            }
        };

        const handleMouseUp = () => {
            setIsDragging(false);
        };

        // --- Touch Events (Mobile/Tablet) ---
        const handleTouchStart = (e) => {
            if (!image) return;
            const touch = e.touches[0];
            setIsDragging(true);
            setDragStart({
                x: touch.clientX - position.x,
                y: touch.clientY - position.y
            });
        };

        const handleTouchMove = (e) => {
            if (isDragging && image) {
                const touch = e.touches[0];
                setPosition({
                    x: touch.clientX - dragStart.x,
                    y: touch.clientY - dragStart.y
                });
            }
        };

        const renderPieLines = () => {
            const lines = [];
            const labels = ['N (坎)', 'NE (艮)', 'E (震)', 'SE (巽)', 'S (離)', 'SW (坤)', 'W (兌)', 'NW (乾)'];
            const radius = 600;
            
            for (let i = 0; i < 8; i++) {
                const angleDeg = (i * 45) - 90 + rotation; 
                const angleRad = (angleDeg * Math.PI) / 180;
                
                const textRadius = 280;
                const tx = centerX + textRadius * Math.cos(angleRad);
                const ty = centerY + textRadius * Math.sin(angleRad);

                const borderAngleDeg = angleDeg - 22.5;
                const borderRad = (borderAngleDeg * Math.PI) / 180;
                const bx = centerX + radius * Math.cos(borderRad);
                const by = centerY + radius * Math.sin(borderRad);

                lines.push(
                    <g key={i} style={{ pointerEvents: 'none' }}>
                        <line x1={centerX} y1={centerY} x2={bx} y2={by} stroke="rgba(22, 163, 74, 0.8)" strokeWidth="1.5" strokeDasharray="5,5" />
                        <text x={tx} y={ty} fill="#15803d" fontSize="16" fontWeight="bold" textAnchor="middle" dominantBaseline="middle" style={{ textShadow: '0px 0px 4px white, 0px 0px 4px white' }}>
                            {labels[i]}
                        </text>
                    </g>
                );
            }
            return lines;
        };

        const renderGrid = () => {
            const size = 600;
            const step = size / 3;
            const half = size / 2;
            
            return (
                <g transform={`translate(${centerX}, ${centerY}) rotate(${rotation})`} style={{ pointerEvents: 'none' }}>
                    <rect x={-half} y={-half} width={size} height={size} fill="none" stroke="rgba(37, 99, 235, 0.3)" strokeWidth="1" />
                    <line x1={-half + step} y1={-half} x2={-half + step} y2={half} stroke="rgba(37, 99, 235, 0.8)" strokeWidth="2" />
                    <line x1={-half + step * 2} y1={-half} x2={-half + step * 2} y2={half} stroke="rgba(37, 99, 235, 0.8)" strokeWidth="2" />
                    <line x1={-half} y1={-half + step} x2={half} y2={-half + step} stroke="rgba(37, 99, 235, 0.8)" strokeWidth="2" />
                    <line x1={-half} y1={-half + step * 2} x2={half} y2={-half + step * 2} stroke="rgba(37, 99, 235, 0.8)" strokeWidth="2" />
                    
                    <text x={0} y={-half + 40} transform={`rotate(${-rotation})`} textAnchor="middle" fill="#1d4ed8" fontSize="20" fontWeight="bold" style={{textShadow: '0 0 4px white'}}>N</text>
                    <text x={0} y={half - 40} transform={`rotate(${-rotation})`} textAnchor="middle" fill="#1d4ed8" fontSize="20" fontWeight="bold" style={{textShadow: '0 0 4px white'}}>S</text>
                    <text x={half - 40} y={0} transform={`rotate(${-rotation})`} textAnchor="middle" fill="#1d4ed8" fontSize="20" fontWeight="bold" style={{textShadow: '0 0 4px white'}}>E</text>
                    <text x={-half + 40} y={0} transform={`rotate(${-rotation})`} textAnchor="middle" fill="#1d4ed8" fontSize="20" fontWeight="bold" style={{textShadow: '0 0 4px white'}}>W</text>
                </g>
            );
        };

        return (
            <div className="w-full max-w-4xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden font-sans border border-gray-200 flex flex-col">
                {/* Header */}
                <div className="bg-slate-50 p-4 border-b border-gray-200 flex flex-wrap justify-between items-center gap-4 z-20 relative">
                    <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                        <IconRefresh /> 風水立極尺 (圖片版)
                    </h2>
                    
                    <label className="cursor-pointer bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-colors shadow-sm select-none">
                        <IconUpload />
                        <span className="text-sm font-bold">上傳戶型圖</span>
                        <input type="file" accept="image/*" onChange={handleFileChange} className="hidden" />
                    </label>
                </div>

                {/* Info Bar */}
                <div className="bg-blue-50 px-4 py-2 text-blue-800 text-xs flex justify-between items-center border-b border-blue-100">
                    <div className="flex items-center gap-2">
                        <IconInfo />
                        <span>{fileName ? `已選擇文件: ${fileName}` : "請上傳圖片以開始分析"}</span>
                    </div>
                    {!image && <span className="text-blue-600/70">支援 JPG, PNG</span>}
                </div>

                {/* Canvas Area */}
                <div 
                    className="relative w-full bg-gray-100 overflow-hidden cursor-move select-none group border-b border-gray-200 canvas-container"
                    style={{ height: '500px', minHeight: '500px' }}
                    onMouseDown={handleMouseDown}
                    onMouseMove={handleMouseMove}
                    onMouseUp={handleMouseUp}
                    onMouseLeave={handleMouseUp}
                    onTouchStart={handleTouchStart}
                    onTouchMove={handleTouchMove}
                    onTouchEnd={handleMouseUp}
                >
                    {/* User Image Layer */}
                    <div 
                        className="absolute origin-center transition-transform duration-0 ease-linear"
                        style={{
                            left: '50%',
                            top: '50%',
                            transform: `translate(-50%, -50%) translate(${position.x}px, ${position.y}px) scale(${scale})`,
                        }}
                    >
                        {image ? (
                            <img src={image} alt="Floor Plan" className="max-w-none opacity-90 shadow-2xl" style={{ pointerEvents: 'none', display: 'block' }} draggable="false" />
                        ) : (
                            <div className="flex flex-col items-center justify-center w-64 h-64 border-4 border-dashed border-gray-300 rounded-xl text-gray-400">
                                <IconImage />
                                <span className="font-bold mt-2">預覽區域</span>
                            </div>
                        )}
                    </div>

                    {/* Overlay Layer (SVG) */}
                    <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox={`0 0 ${canvasWidth} ${canvasHeight}`} preserveAspectRatio="xMidYMid meet" style={{ zIndex: 10 }}>
                        <line x1={centerX} y1="0" x2={centerX} y2={canvasHeight} stroke="rgba(0,0,0,0.1)" strokeWidth="1" />
                        <line x1="0" y1={centerY} x2={canvasWidth} y2={centerY} stroke="rgba(0,0,0,0.1)" strokeWidth="1" />
                        {mode === 'pie' ? renderPieLines() : renderGrid()}
                        <circle cx={centerX} cy={centerY} r="6" fill="#dc2626" stroke="white" strokeWidth="2" />
                        <circle cx={centerX} cy={centerY} r="30" fill="none" stroke="#dc2626" strokeWidth="1" strokeDasharray="2,2" opacity="0.5" />
                    </svg>

                    {image && (
                        <div className="absolute bottom-4 right-4 bg-black/60 text-white text-xs px-2 py-1 rounded pointer-events-none z-20">
                            拖曳圖片以對齊中心點
                        </div>
                    )}
                </div>

                {/* Controls */}
                <div className="bg-white p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 z-20 relative">
                    <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <div className="flex justify-between mb-2">
                            <label className="text-sm font-bold text-gray-700 flex items-center gap-2">
                                <IconRotate /> 羅盤方位 (N)
                            </label>
                            <span className="text-xs font-mono bg-white px-2 py-0.5 rounded border">{rotation}°</span>
                        </div>
                        <input type="range" min="0" max="360" value={rotation} onChange={(e) => setRotation(Number(e.target.value))} className="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-green-600" />
                    </div>

                    <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <div className="flex justify-between mb-2">
                            <label className="text-sm font-bold text-gray-700 flex items-center gap-2">
                                <IconZoom /> 圖片縮放
                            </label>
                            <span className="text-xs font-mono bg-white px-2 py-0.5 rounded border">{(scale * 100).toFixed(0)}%</span>
                        </div>
                        <input type="range" min="0.2" max="3" step="0.1" value={scale} onChange={(e) => setScale(Number(e.target.value))} className="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                    </div>

                    <div className="flex items-center justify-center gap-2">
                        <button onClick={() => setMode('grid')} className={`flex-1 py-3 px-4 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-all ${mode === 'grid' ? 'bg-blue-600 text-white shadow-md' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'}`}>
                            <IconGrid /> 九宮格
                        </button>
                        <button onClick={() => setMode('pie')} className={`flex-1 py-3 px-4 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-all ${mode === 'pie' ? 'bg-green-600 text-white shadow-md' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'}`}>
                            <IconPie /> 放射法
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FengShuiUploader />);
</script>

</body>
</html>
